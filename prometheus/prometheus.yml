global:
  scrape_interval: 1m
  scrape_timeout: 8s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: "db-port-availability"
    metrics_path: /probe
    params:
      module:
        - tcp_connect
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/db-targets.yml
        refresh_interval: 60s
    relabel_configs:
      - source_labels:
          - __address__
        target_label: __param_target
      - source_labels:
          - __param_target
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: "blackbox-pg-writer"
    scrape_interval: 10s
    scrape_timeout: 5s
    fallback_scrape_protocol: PrometheusText0.0.4
    static_configs:
      - targets:
          - blackbox-pg-writer:8080
